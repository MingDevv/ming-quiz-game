<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingdev | Quiz Master Pro ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7); /* โปร่งแสงขึ้นเพื่อความฟรุ้งฟริ้ง */
            --primary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
            --accent: #f472b6; /* เพิ่มสีชมพูฟรุ้งฟริ้ง */
        }

        /* พื้นหลังแบบมีแสงระยิบระยับ */
        body {
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            color: var(--text);
            display: flex;
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* สร้างดาววิบวับด้วย CSS */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
            animation: stars 60s linear infinite;
            z-index: -1;
            opacity: 0.5;
        }

        @keyframes stars {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 550px, 390px 410px; }
        }

        /* หัวข้อสีรุ้งวิบวับ */
        .main-title {
            text-align: center;
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #8b5cf6, #f472b6, #3b82f6, #8b5cf6);
            background-size: 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-text 5s linear infinite;
            text-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
            margin-bottom: 40px;
        }

        @keyframes gradient-text {
            0% { background-position: 0%; }
            100% { background-position: 300%; }
        }

        /* กล่องเกมแบบ Glassmorphism */
        .container {
            background: var(--card);
            backdrop-filter: blur(15px); /* เบลอหลังกล่อง */
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 550px;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(255,255,255,0.15);
            box-sizing: border-box;
            position: relative;
        }

        .container::after {
            content: "";
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            border-radius: 30px;
            z-index: -1;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        /* Progress Bar ฟรุ้งฟริ้ง */
        .progress-box { flex: 1; height: 12px; background: rgba(51, 65, 85, 0.5); border-radius: 10px; margin: 0 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        #bar { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--primary), var(--accent));
            box-shadow: 0 0 15px var(--primary);
            transition: 0.6s cubic-bezier(0.17, 0.67, 0.83, 0.67); 
        }

        .question-box h2 { font-size: 24px; margin-bottom: 30px; text-align: center; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .options-grid { display: grid; gap: 15px; }
        
        /* ปุ่มตัวเลือกแบบมีแสงวิบวับเวลา Hover */
        .option {
            background: rgba(71, 85, 105, 0.4);
            padding: 18px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            font-weight: 500;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .option:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: var(--primary);
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* เอฟเฟกต์แสงวิ่งผ่านปุ่ม */
        .option::before {
            content: "";
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .option:hover::before { left: 200%; }

        .option.correct { background: var(--success) !important; border-color: white; box-shadow: 0 0 20px var(--success); }
        .option.wrong { background: var(--danger) !important; border-color: white; box-shadow: 0 0 20px var(--danger); }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-primary { 
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4);
        }
        .btn-primary:hover { transform: scale(1.03); box-shadow: 0 8px 25px rgba(139, 92, 246, 0.6); }

        .btn-retry { background: #f59e0b; color: white; }
        .hidden { display: none; }
        #hp { font-size: 22px; filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.5)); }
    </style>
</head>
<body>

    <header class="main-title">
        คุณรู้ใจ หมิง แค่ไหน
    </header>

    <div class="container">
        <div id="game-screen">
            <div class="header-info">
                <span id="q-count" style="font-weight: bold; color: var(--accent);">1/10</span>
                <div class="progress-box"><div id="bar"></div></div>
                <span id="hp">❤️❤️❤️</span>
            </div>
            <div class="question-box">
                <h2 id="q-text">✨ เตรียมพบกับความสนุก ✨</h2>
                <div class="options-grid" id="opt-container"></div>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="result-title" style="color: var(--accent);">สรุปคะแนน</h2>
            <div style="font-size: 50px; text-align: center; margin-bottom: 15px; font-weight: bold; text-shadow: 0 0 20px var(--primary);" id="final-score">0/10</div>
            <div class="summary-list" id="summary-content" style="color: #cbd5e1;"></div>
            
            <button id="redemption-btn" class="btn btn-retry hidden" onclick="startRedemption()">🔥 แก้ตัวข้อที่ผิด!</button>
            <button class="btn btn-primary" onclick="location.reload()">เริ่มเล่นใหม่ ✨</button>
        </div>
    </div>

    <script>
        // ... (JavaScript ส่วนเดิมคงไว้ทั้งหมด) ...
        const allData = [
            { q: "หมิงชอบกินอะไรที่สุด?", opt: ["กะเพราหมูกรอบ", "ชาบูเนื้อ", "ซูชิ", "อาหารเม็ด"], ans: 0 },
            { q: "หมิงอยากเป็น Developer สายไหน?", opt: ["Frontend", "Backend", "Full Stack", "Mobile Dev"], ans: 2 },
            { q: "นิสัยจริงๆ ของหมิงเป็นยังไง?", opt: ["นิ่งๆ ขรึมๆ", "ตลกกวนประสาท", "ขี้อาย", "พูดมาก"], ans: 1 },
            { q: "หมิงกลัวอะไรมากที่สุด?", opt: ["ผี", "ความจน", "แมลงสาบ", "ไม่มีเน็ต"], ans: 1 },
            { q: "หมิงสูงเท่าไหร่?", opt: ["170 cm", "174 cm", "178 cm", "182 cm"], ans: 1 },
            { q: "วันว่างหมิงมักจะทำอะไร?", opt: ["เขียนโค้ด", "นอนเปื่อย", "เล่นเกม", "หาของกิน"], ans: 0 },
            { q: "สีที่หมิงชอบที่สุดคือ?", opt: ["แดง", "ดำ", "ขาว", "น้ำเงิน"], ans: 0 },
            { q: "หมิงชอบไปเที่ยวที่ไหน?", opt: ["ทะเล", "ภูเขา", "ห้าง", "ต่างประเทศ"], ans: 1 },
            { q: "ถ้าหมิงรวย จะซื้ออะไรอย่างแรก?", opt: ["บ้านให้แม่", "รถสปอร์ต", "อัพคอมแรงๆ", "ไปเที่ยวรอบโลก"], ans: 2 },
            { q: "ฉายาที่เพื่อนเรียกหมิงบ่อยที่สุด?", opt: ["ไอ้หล่อ", "เทพหมิง", "หมิงซ่า", "ตัวตึง"], ans: 1 }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let lives = 3;
        let userLogs = [];
        let wrongIndices = [];

        function initGame() {
            currentQuestions = [...allData].sort(() => Math.random() - 0.5);
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('q-count').innerText = `${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('bar').style.width = `${(currentIndex / currentQuestions.length) * 100}%`;
            document.getElementById('hp').innerText = '❤️'.repeat(lives) || '💔';

            const container = document.getElementById('opt-container');
            container.innerHTML = '';
            q.opt.forEach((text, i) => {
                const el = document.createElement('div');
                el.className = 'option';
                el.innerText = text;
                el.onclick = () => checkAnswer(i, el);
                container.appendChild(el);
            });
        }

        function checkAnswer(selected, el) {
            const correct = currentQuestions[currentIndex].ans;
            const options = document.querySelectorAll('.option');
            options.forEach(o => o.style.pointerEvents = 'none');

            if (selected === correct) {
                el.classList.add('correct');
                score++;
                userLogs.push({ q: currentQuestions[currentIndex].q, res: '✅' });
            } else {
                el.classList.add('wrong');
                options[correct].classList.add('correct');
                lives--;
                userLogs.push({ q: currentQuestions[currentIndex].q, res: '❌' });
                wrongIndices.push(currentQuestions[currentIndex]);
            }

            setTimeout(() => {
                currentIndex++;
                if (lives > 0 && currentIndex < currentQuestions.length) {
                    renderQuestion();
                } else {
                    showFinalResult();
                }
            }, 1000);
        }

        function showFinalResult() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').innerText = `${score}/${allData.length}`;
            
            const content = document.getElementById('summary-content');
            content.innerHTML = userLogs.map(log => `
                <div class="summary-item" style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);">
                    <span>${log.q}</span>
                    <span>${log.res}</span>
                </div>
            `).join('');

            if (wrongIndices.length > 0 && lives <= 0) {
                document.getElementById('redemption-btn').classList.remove('hidden');
                document.getElementById('result-title').innerText = "💔 หัวใจหมดแล้ว!";
            } else {
                document.getElementById('result-title').innerText = "✨ สรุปผลงานคนเก่ง ✨";
            }
        }

        function startRedemption() {
            currentQuestions = [...wrongIndices];
            currentIndex = 0;
            lives = 3;
            wrongIndices = [];
            userLogs = userLogs.filter(l => l.res === '✅');
            
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('redemption-btn').classList.add('hidden');
            renderQuestion();
        }

        initGame();
    </script>
</body>
</html>
