<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mingdev | มาลองทายใจหมิง ✨</title>
    <link href="https://script.google.com/macros/s/AKfycbwBb_DSLhyGuoANUVlHaFcXArYrBsz9KEolm-WlZ4Mpz9JJg5S7jXTOMX0S_t_N9U1iBw/exec" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #8b5cf6;
            --accent: #f472b6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #f8fafc;
        }

        body {
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            color: var(--text);
            display: flex;
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

       .main-title {
            text-align: center;
            font-size: clamp(30px, 8vw, 48px);
            font-weight: 900;
            letter-spacing: 5px;
            margin: 30px 0;
            
            /* ชุดคำสั่งแก้บัค */
            background: linear-gradient(90deg, #8b5cf6, #f472b6, #3b82f6, #8b5cf6);
            background-size: 300%;
            display: block; /* มั่นใจว่ามีพื้นที่สำหรับแสดงผล */
            
            /* ต้องมีทั้ง 2 บรรทัดนี้ และเรียงแบบนี้ */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent; /* fallback สำหรับบางเครื่อง */
            
            animation: gradient-text 5s linear infinite;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));
        }

        @keyframes gradient-text { 0% { background-position: 0%; } 100% { background-position: 300%; } }

        .container {
            background: var(--card);
            backdrop-filter: blur(20px);
            width: 100%;
            max-width: 550px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            box-sizing: border-box;
            transition: 0.5s;
        }

        /* Input หน้าแรก */
        input#player-name {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 20px;
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            transition: 0.3s;
        }
        input#player-name:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* ปุ่มกดแบบ 3D */
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-main {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 6px 0 #6d28d9, 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px 0 #6d28d9; }

        /* ตัวเลือกคำตอบ */
        .option {
            background: rgba(255,255,255,0.05);
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            font-size: 18px;
            text-align: center;
        }
        .option:hover { background: rgba(139, 92, 246, 0.2); transform: scale(1.02); border-color: var(--primary); }
        .option.correct { background: var(--success) !important; color: white; border-color: #fff; box-shadow: 0 0 20px var(--success); }
        .option.wrong { background: var(--danger) !important; color: white; border-color: #fff; box-shadow: 0 0 20px var(--danger); }

        /* Leaderboard */
        .leaderboard { margin-top: 30px; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 20px; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 18px; }
        .rank-item:last-child { border-bottom: none; }

        .hidden { display: none; }
        #hp-display { font-size: 24px; }
    </style>
</head>
<body>

    <header class="main-title">คุณรู้ใจหมิงแค่ไหน</header>

    <div class="container">
        <div id="start-screen">
            <h2 style="margin-top:0">✨ มาทายใจหมิงกัน ✨</h2>
            <p style="opacity: 0.8">กรุณาใส่ชื่อของคุณเพื่อเริ่มบันทึกคะแนน</p>
            <input type="text" id="player-name" placeholder="ชื่อเล่นของคุณ..." maxlength="15">
            <button class="btn btn-main" onclick="startGame()">เริ่มเล่นเลย!</button>
        </div>

        <div id="game-screen" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <span id="q-count" style="color: var(--accent); font-weight: bold; font-size: 18px;">1/10</span>
                <span id="hp-display">❤️❤️❤️</span>
            </div>
            <h2 id="q-text" style="font-size: 24px; min-height: 80px; text-align: center;">...</h2>
            <div id="opt-container"></div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 id="status-msg">จบเกมแล้ว!</h2>
            <div style="font-size: 60px; font-weight: 900; color: var(--accent); margin: 10px 0;" id="final-score">0</div>
            <p id="saving-msg" style="color: #10b981; font-weight: bold;">⌛ กำลังบันทึกสถิติ...</p>
            
            <div class="leaderboard">
                <h3 style="margin-top:0; text-align:center; color: var(--primary);">🏆 อันดับผู้เล่นล่าสุด</h3>
                <div id="rank-list"></div>
            </div>
            <button class="btn btn-main" style="margin-top:25px" onclick="location.reload()">เล่นใหม่ ✨</button>
        </div>
    </div>

    <script>
    const SHEETS_URL = "https://script.google.com/macros/s/AKfycbwXJHMHNrvyx2ilXzfqO3Li2_wLZOksyx0Drvnf7ZFhOyj3LctxaHcF--1WMLK_f87BGA/exec"; 

    const allData = [
        { q: "หมิงชอบกินอะไรที่สุด?", opt: ["กะเพราหมูกรอบ", "ชาบูเนื้อ", "ซูชิ", "อาหารเม็ด"], ans: 0 },
        { q: "หมิงอยากเป็น Developer สายไหน?", opt: ["Frontend", "Backend", "Full Stack", "Mobile Dev"], ans: 2 },
        { q: "นิสัยจริงๆ ของหมิงเป็นยังไง?", opt: ["นิ่งๆ ขรึมๆ", "ตลกกวนประสาท", "ขี้อาย", "พูดมาก"], ans: 1 },
        { q: "หมิงกลัวอะไรมากที่สุด?", opt: ["ผี", "ความจน", "แมลงสาบ", "ไม่มีเน็ต"], ans: 3 },
        { q: "หมิงสูงเท่าไหร่?", opt: ["170 cm", "174 cm", "178 cm", "182 cm"], ans: 1 },
        { q: "วันว่างหมิงมักจะทำอะไร?", opt: ["เขียนโค้ด", "นอนเปื่อย", "เล่นเกม", "หาของกิน"], ans: 0 },
        { q: "สีที่หมิงชอบที่สุดคือ?", opt: ["แดง", "ดำ", "ขาว", "น้ำเงิน"], ans: 0 },
        { q: "หมิงชอบไปเที่ยวที่ไหน?", opt: ["ทะเล", "ภูเขา", "ห้าง", "ต่างประเทศ"], ans: 1 },
        { q: "ถ้าหมิงรวย จะซื้ออะไรอย่างแรก?", opt: ["บ้านให้แม่", "รถสปอร์ต", "อัพคอมแรงๆ", "ไปเที่ยวรอบโลก"], ans: 2 },
        { q: "ฉายาที่เพื่อนเรียกหมิงบ่อยที่สุด?", opt: ["สุดหล่อ", "เทพหมิง", "หมิงซ่า", "เฮียหมิง"], ans: 3}
    ];

    let playerName = "";
    let currentIndex = 0;
    let score = 0;
    let lives = 3;

    function startGame() {
        playerName = document.getElementById('player-name').value.trim();
        if(!playerName) return alert("กรุณาใส่ชื่อก่อนเริ่มเล่นครับ!");
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const q = allData[currentIndex];
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('q-count').innerText = `${currentIndex + 1}/${allData.length}`;
        const container = document.getElementById('opt-container');
        container.innerHTML = '';
        
        q.opt.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = text;
            div.onclick = () => checkAnswer(i, div);
            container.appendChild(div);
        });
    }

    function checkAnswer(selected, el) {
        const correct = allData[currentIndex].ans;
        const options = document.querySelectorAll('.option');
        options.forEach(o => o.style.pointerEvents = 'none');

        if(selected === correct) {
            el.classList.add('correct');
            score++;
        } else {
            el.classList.add('wrong');
            options[correct].classList.add('correct');
            lives--;
            // อัปเดตเลือดทันทีที่ตอบผิด
            document.getElementById('hp-display').innerText = lives > 0 ? '❤️'.repeat(lives) : '💔';
        }

        setTimeout(() => {
            currentIndex++;
            if(lives > 0 && currentIndex < allData.length) {
                renderQuestion();
            } else {
                finishGame();
            }
        }, 1000);
    }

    async function finishGame() {
        // --- 1. สลับหน้าจอมาที่หน้าผลลัพธ์ ---
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score}/${allData.length}`;

        if(lives <= 0) document.getElementById('status-msg').innerText = "เสียใจด้วย หัวใจหมดซะก่อน! 💔";

        // --- 2. ส่งข้อมูลไป Google Sheets ---
        try {
            await fetch(SHEETS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ name: playerName, score: score })
            });
            document.getElementById('saving-msg').innerText = "✅ บันทึกแล้ว! กำลังโหลดอันดับ...";
        } catch (e) {
            document.getElementById('saving-msg').innerText = "❌ บันทึกขัดข้อง แต่ยังดูอันดับได้";
        }

        // --- 3. ดึงอันดับมาโชว์ ---
        setTimeout(fetchLeaderboard, 2000);
    }

    async function fetchLeaderboard() {
        try {
            const response = await fetch(SHEETS_URL);
            const data = await response.json();
            const list = document.getElementById('rank-list');
            list.innerHTML = ''; 
            
            data.forEach((player, index) => {
                let medal = "";
                if(index === 0) medal = "🥇 ";
                else if(index === 1) medal = "🥈 ";
                else if(index === 2) medal = "🥉 ";
                else medal = `${index + 1}. `;

                const item = document.createElement('div');
                item.className = 'rank-item';
                if(index === 0) item.style.color = "#fbbf24"; 
                item.innerHTML = `<span>${medal}${player.name}</span><span>${player.score} แต้ม</span>`;
                list.appendChild(item);
            });
        } catch (e) {
            console.log("กำลังโหลดข้อมูลอันดับ...");
        }
    }
</script>
</body>
</html>
</body>
</html>
